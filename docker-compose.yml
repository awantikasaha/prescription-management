services:
  web:
    build: .
    command: sh -c "python manage.py migrate && gunicorn prescription_service.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    volumes:
      - .:/app
    expose:
      - 8000
  nginx:
    image: nginx:alpine
    ports:
      - '8080:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
